    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #fef1e7;
        --mint: #dbf5f0;
        --lavender: #fce0ff;
        --white: #ffffff;
        --dark: #1a1a1a;
        --mid: #6b6565;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: var(--cream);
        color: var(--dark);
        min-height: 100vh;
      }

      .lettermark {
        font-family: "Cherry Bomb One", cursive;
      }

      /* ── Neo-brutal primitives ── */
      .neo-card {
        background: var(--white);
        border: 2.5px solid var(--dark);
        box-shadow: 5px 5px 0 var(--dark);
        border-radius: 16px;
      }

      .neo-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: "Poppins", sans-serif;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        border: 2.5px solid var(--dark);
        box-shadow: 4px 4px 0 var(--dark);
        border-radius: 10px;
        transition: transform 0.08s ease, box-shadow 0.08s ease;
      }
      .neo-btn:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--dark);
      }
      .neo-btn:active {
        transform: translate(4px, 4px);
        box-shadow: 0 0 0 var(--dark);
      }

      .neo-input {
        width: 100%;
        border: 2.5px solid var(--dark);
        border-radius: 10px;
        font-family: "Poppins", sans-serif;
        padding: 12px 16px;
        font-size: 0.95rem;
        background: #efefef;
        color: var(--dark);
        outline: none;
      }
      .neo-input:focus {
        box-shadow: 3px 3px 0 var(--mint);
      }
      .neo-input::placeholder {
        color: #9b9b9b;
      }

      /* ── Layout ── */
      .page-wrap {
        max-width: 440px;
        margin: 0 auto;
        padding: 48px 20px 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      /* ── App image ── */
      .app-image {
        width: 100%;
        max-width: 300px;
        border-radius: 40px;
        overflow: hidden;
      }
      .app-image img {
        width: 100%;
        display: block;
      }

      /* ── Download buttons ── */
      .download-btns {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        width: 100%;
        max-width: 360px;
      }
      .download-btns a {
        flex: 1;
        min-width: 140px;
        padding: 13px 14px;
        font-size: 0.88rem;
      }
      .btn-ios {
        background: var(--dark);
        color: var(--cream);
      }
      .btn-android {
        background: var(--mint);
        color: var(--dark);
      }

      /* ── Waitlist card ── */
      .waitlist-card {
        width: 100%;
        max-width: 360px;
        padding: 26px 22px;
      }
      .waitlist-card form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 16px;
      }

      /* ── Footer ── */
      footer {
        padding-top: 4px;
      }
      footer p {
        font-size: 0.7rem;
        font-weight: 500;
        text-align: center;
        line-height: 2;
        color: var(--dark);
      }
      footer a {
        font-weight: 700;
        color: var(--dark);
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      footer a:hover {
        color: var(--mid);
      }
    </style>
  </head>
  <body>
    <div class="page-wrap">

          text-shadow: 5px 5px 0 var(--mint);

        weirdfriends

      <!-- Tagline -->
      <p

          font-weight: 600;
          text-align: center;
          max-width: 260px;
          line-height: 1.5;
          color: var(--dark);
        "
      >
        text weird AI characters &amp; learn a foreign language
      </p>

      <!-- App image — center point -->
      <div class="app-image">
        <img src="app.png" alt="weirdfriends app" />
      </div>
