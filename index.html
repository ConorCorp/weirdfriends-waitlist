<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-X92KKS8ZJP"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-X92KKS8ZJP");
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weirdfriends</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #fef1e7;
        --mint: #dbf5f0;
        --lavender: #fce0ff;
        --white: #ffffff;
        --dark: #1a1a1a;
        --mid: #6b6565;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: var(--cream);
        color: var(--dark);
        min-height: 100vh;
      }

      .lettermark {
        font-family: "Cherry Bomb One", cursive;
      }

      .neo-card {
        background: var(--white);
        border: 2.5px solid var(--dark);
        box-shadow: 5px 5px 0 var(--dark);
        border-radius: 16px;
      }

      .neo-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-family: "Poppins", sans-serif;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        border: 2.5px solid var(--dark);
        box-shadow: 4px 4px 0 var(--dark);
        border-radius: 10px;
        transition: transform 0.08s ease, box-shadow 0.08s ease;
      }
      .neo-btn:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--dark);
      }
      .neo-btn:active {
        transform: translate(4px, 4px);
        box-shadow: 0 0 0 var(--dark);
      }

      .neo-input {
        width: 100%;
        border: 2.5px solid var(--dark);
        border-radius: 10px;
        font-family: "Poppins", sans-serif;
        padding: 12px 16px;
        font-size: 0.95rem;
        background: #efefef;
        color: var(--dark);
        outline: none;
      }
      .neo-input:focus {
        box-shadow: 3px 3px 0 var(--mint);
      }
      .neo-input::placeholder {
        color: #9b9b9b;
      }

      .page-wrap {
        max-width: 440px;
        margin: 0 auto;
        padding: 48px 20px 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        position: relative;
        z-index: 1;
      }

      .app-image {
        width: 100%;
        max-width: 300px;
      }
      .app-image img {
        width: 100%;
        display: block;
        border-radius: 40px;
        filter: drop-shadow(8px 8px 0px rgba(0, 0, 0, 0.15));
        transition: filter 0.15s ease;
      }

      .waitlist-card {
        width: 100%;
        max-width: 360px;
        padding: 26px 22px;
      }
      .waitlist-card form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 16px;
      }

      footer {
        padding-top: 4px;
      }
      footer p {
        font-size: 0.7rem;
        font-weight: 500;
        text-align: center;
        line-height: 2;
        color: var(--dark);
      }
      footer a {
        font-weight: 700;
        color: var(--dark);
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      footer a:hover {
        color: var(--mid);
      }

      /* ── STAGGERED ENTRANCE ── */
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(28px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .anim-in {
        opacity: 0;
        animation: fade-in-up 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      /* ── GRAIN OVERLAY ── */
      .grain {
        position: fixed;
        inset: -200px;
        width: calc(100% + 400px);
        height: calc(100% + 400px);
        opacity: 0.04;
        pointer-events: none;
        z-index: 9999;
        filter: url(#grain-filter);
        background: #fff;
        animation: grain-shift 0.3s steps(3) infinite;
      }
      @keyframes grain-shift {
        0% {
          transform: translate(0, 0);
        }
        33% {
          transform: translate(-22px, -12px);
        }
        66% {
          transform: translate(12px, 18px);
        }
        100% {
          transform: translate(-8px, 6px);
        }
      }

      /* ── FLOATING BUBBLES ── */
      @keyframes bubble-float {
        0% {
          transform: translateY(110vh) rotate(-2deg);
          opacity: 0;
        }
        5% {
          opacity: 0.65;
        }
        90% {
          opacity: 0.45;
        }
        100% {
          transform: translateY(-15vh) rotate(2deg);
          opacity: 0;
        }
      }
      .bubbles-bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .bubble {
        position: absolute;
        bottom: -80px;
        padding: 6px 14px;
        border: 2px solid var(--dark);
        border-radius: 100px;
        font-family: "Poppins", sans-serif;
        font-size: 0.72rem;
        font-weight: 600;
        white-space: nowrap;
        opacity: 0;
        animation: bubble-float linear infinite;
        box-shadow: 2px 2px 0 var(--dark);
      }

      /* ── APP TILT WRAPPER ── */
      .app-tilt-wrapper {
        transition: transform 0.15s ease;
        will-change: transform;
      }
    </style>
  </head>
  <body>
    <!-- SVG filter for film grain -->
    <svg style="display: none" aria-hidden="true">
      <defs>
        <filter id="grain-filter">
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.65"
            numOctaves="3"
            stitchTiles="stitch"
          />
          <feColorMatrix type="saturate" values="0" />
        </filter>
      </defs>
    </svg>

    <div class="grain" aria-hidden="true"></div>
    <div class="bubbles-bg" aria-hidden="true"></div>

    <div class="page-wrap">
      <h1
        class="lettermark anim-in"
        style="
          font-size: clamp(2.8rem, 10vw, 4.4rem);
          line-height: 1;
          text-align: center;
          text-shadow: 5px 5px 0 var(--mint);
          animation-delay: 0ms;
        "
      >
        weirdfriends
      </h1>

      <p
        class="anim-in"
        style="
          font-size: 0.95rem;
          font-weight: 600;
          text-align: center;
          max-width: 300px;
          line-height: 1.5;
          color: var(--dark);
          animation-delay: 160ms;
        "
      >
        be the person who gets the joke, learn 50+ languages with strange ais
      </p>

      <div class="app-image anim-in" style="animation-delay: 320ms">
        <div class="app-tilt-wrapper" id="app-tilt">
          <img src="app.png" alt="weirdfriends app" />
        </div>
      </div>

      <div
        class="neo-card waitlist-card anim-in"
        style="animation-delay: 480ms"
      >
        <p style="font-weight: 800; font-size: 1.05rem; text-align: center">
          join the waitlist
        </p>
        <p
          style="
            font-size: 0.78rem;
            font-weight: 500;
            text-align: center;
            color: var(--mid);
            margin-top: 4px;
          "
        >
          get an email when we launch &amp; get it for
          <strong style="color: var(--dark)">FREE</strong> 🤑
        </p>
        <form
          id="waitlist-form"
          action="https://api.web3forms.com/submit"
          method="POST"
        >
          <input
            type="hidden"
            name="access_key"
            value="e2d1a37f-145d-4f94-9778-d65b0259cf43"
          />
          <input
            type="email"
            name="email"
            placeholder="your email"
            required
            class="neo-input"
          />
          <button
            id="submit-btn"
            type="submit"
            class="neo-btn"
            style="
              background: var(--lavender);
              color: var(--dark);
              padding: 13px 24px;
              font-size: 0.95rem;
              width: 100%;
            "
          >
            get early access →
          </button>
        </form>
      </div>

      <footer class="anim-in" style="animation-delay: 600ms">
        <p>
          🏗️ with ❤ in berlin by
          <a href="https://c0n0.com" target="_blank">conor</a> &middot;
          <a href="/privacy.html">privacy</a> &middot;
          <a href="/account-deletion-request.html">account deletion</a>
        </p>
      </footer>
    </div>

    <script>
      /* 1. FLOATING LANGUAGE BUBBLES */
      const GREETINGS = [
        { text: "Hola 👋", bg: "#dbf5f0" },
        { text: "こんにちは", bg: "#fce0ff" },
        { text: "Bonjour", bg: "#fef1e7" },
        { text: "مرحبا", bg: "#dbf5f0" },
        { text: "Ciao 🤌", bg: "#fce0ff" },
        { text: "안녕하세요", bg: "#fef1e7" },
        { text: "Olá", bg: "#dbf5f0" },
        { text: "Привет", bg: "#fce0ff" },
        { text: "你好", bg: "#fef1e7" },
        { text: "Hallo", bg: "#dbf5f0" },
        { text: "Namaste 🙏", bg: "#fce0ff" },
        { text: "Merhaba", bg: "#fef1e7" },
        { text: "שלום", bg: "#dbf5f0" },
        { text: "Salut", bg: "#fce0ff" },
        { text: "Ahoj", bg: "#fef1e7" },
      ];

      const bubblesEl = document.querySelector(".bubbles-bg");
      GREETINGS.forEach((g) => {
        const el = document.createElement("div");
        el.className = "bubble";
        el.textContent = g.text;
        el.style.background = g.bg;
        el.style.left = 4 + Math.random() * 88 + "%";
        const dur = 22 + Math.random() * 18;
        el.style.animationDuration = dur + "s";
        el.style.animationDelay = -(Math.random() * dur) + "s";
        bubblesEl.appendChild(el);
      });

      /* 2. APP MOCKUP 3D TILT */
      const appTilt = document.getElementById("app-tilt");
      const appWrap = appTilt.closest(".app-image");
      const appImg = appTilt.querySelector("img");

      appWrap.addEventListener("mousemove", (e) => {
        const r = appTilt.getBoundingClientRect();
        const dx = (e.clientX - (r.left + r.width / 2)) / (r.width / 2);
        const dy = (e.clientY - (r.top + r.height / 2)) / (r.height / 2);
        appTilt.style.transition = "transform 0.1s ease";
        appTilt.style.transform = `perspective(500px) rotateY(${
          dx * 14
        }deg) rotateX(${-dy * 10}deg) scale(1.03)`;
        appImg.style.filter = `drop-shadow(${-dx * 10}px ${
          dy * 10
        }px 0px rgba(0,0,0,0.2))`;
      });
      appWrap.addEventListener("mouseleave", () => {
        appTilt.style.transition = "transform 0.55s ease";
        appTilt.style.transform = "";
        appImg.style.filter = "drop-shadow(8px 8px 0px rgba(0,0,0,0.15))";
      });

      /* 4. MAGNETIC SUBMIT BUTTON */
      const btn = document.getElementById("submit-btn");
      btn.addEventListener("mouseenter", () => {
        btn.style.transition = "transform 0.15s ease, box-shadow 0.15s ease";
      });
      btn.addEventListener("mousemove", (e) => {
        const r = btn.getBoundingClientRect();
        const dx = (e.clientX - (r.left + r.width / 2)) * 0.22;
        const dy = (e.clientY - (r.top + r.height / 2)) * 0.22;
        btn.style.transform = `translate(${dx}px, ${dy}px)`;
        btn.style.boxShadow = `${Math.max(0.5, 4 - dx * 0.12)}px ${Math.max(
          0.5,
          4 - dy * 0.12
        )}px 0 var(--dark)`;
      });
      btn.addEventListener("mouseleave", () => {
        btn.style.transition = "transform 0.08s ease, box-shadow 0.08s ease";
        btn.style.transform = "";
        btn.style.boxShadow = "";
      });
      btn.addEventListener("mousedown", () => {
        btn.style.transform = "translate(4px, 4px)";
        btn.style.boxShadow = "0 0 0 var(--dark)";
      });

      /* 5. CONFETTI + FORM INTERCEPT */
      function launchConfetti(origin) {
        const r = origin.getBoundingClientRect();
        const ox = ((r.left + r.width / 2) / window.innerWidth) * 100;
        const oy = ((r.top + r.height / 2) / window.innerHeight) * 100;
        const palette = [
          "#dbf5f0",
          "#fce0ff",
          "#fef1e7",
          "#1a1a1a",
          "#ffffff",
          "#ffd166",
        ];

        const wrap = document.createElement("div");
        wrap.style.cssText =
          "position:fixed;inset:0;pointer-events:none;z-index:9998;overflow:hidden";
        document.body.appendChild(wrap);

        for (let i = 0; i < 75; i++) {
          const el = document.createElement("div");
          const size = 6 + Math.random() * 9;
          const color = palette[Math.floor(Math.random() * palette.length)];
          const angle = Math.random() * Math.PI * 2;
          const speed = 5 + Math.random() * 11;
          let vx = Math.cos(angle) * speed,
            vy = Math.sin(angle) * speed - 9;
          let x = ox,
            y = oy,
            rot = Math.random() * 360;
          const rotSpd = (Math.random() - 0.5) * 12;
          const round = Math.random() > 0.55;
          el.style.cssText = `position:absolute;width:${size}px;height:${
            round ? size : size * 0.5
          }px;background:${color};border:1.5px solid #1a1a1a;border-radius:${
            round ? "50%" : "2px"
          };left:${x}%;top:${y}%;transform-origin:center;`;
          wrap.appendChild(el);

          let f = 0;
          const tick = () => {
            vy += 0.38;
            vx *= 0.99;
            x += vx * 0.11;
            y += vy * 0.11;
            rot += rotSpd;
            el.style.left = x + "%";
            el.style.top = y + "%";
            el.style.transform = `rotate(${rot}deg)`;
            el.style.opacity = Math.max(0, 1 - f / 85);
            if (f++ < 85) requestAnimationFrame(tick);
            else el.remove();
          };
          setTimeout(() => requestAnimationFrame(tick), Math.random() * 120);
        }
        setTimeout(() => wrap.remove(), 3500);
      }

      document
        .getElementById("waitlist-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const formData = new FormData(e.target);
          const json = JSON.stringify(Object.fromEntries(formData));

          btn.disabled = true;
          btn.textContent = "sending... ✉️";
          btn.style.opacity = "0.7";
          btn.style.cursor = "not-allowed";

          launchConfetti(btn);

          fetch("https://api.web3forms.com/submit", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            body: json,
          })
            .then(async (response) => {
              const data = await response.json();
              if (response.status === 200) {
                window.location.href = "/thanks.html";
              } else {
                console.error(data.message);
              }
            })
            .catch((error) => {
              console.error(error);
            })
            .then(() => {
              e.target.reset();
            });
        });
    </script>
  </body>
</html>
