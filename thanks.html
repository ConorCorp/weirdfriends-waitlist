<html lang="en">
  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <title>weirdfriends — thanks!</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --cream:    #F5EBDC;
        --mint:     #C5EDE8;
        --lavender: #EDE0F0;
        --white:    #FFFFFF;
        --dark:     #1A1A1A;
        --mid:      #6B6565;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: var(--cream);
        color: var(--dark);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        gap: 28px;
      }

      .lettermark { font-family: "Cherry Bomb One", cursive; }

      .neo-card {
        background: var(--white);
        border: 2.5px solid var(--dark);
        box-shadow: 5px 5px 0 var(--dark);
        border-radius: 16px;
        padding: 40px 32px;
        text-align: center;
        max-width: 360px;
        width: 100%;
      }

      .neo-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: "Poppins", sans-serif;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        border: 2.5px solid var(--dark);
        box-shadow: 4px 4px 0 var(--dark);
        border-radius: 10px;
        padding: 13px 28px;
        font-size: 0.95rem;
        background: var(--dark);
        color: var(--cream);
        margin-top: 22px;
        transition: transform 0.08s ease, box-shadow 0.08s ease;
      }
      .neo-btn:hover  { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--dark); }
      .neo-btn:active { transform: translate(4px, 4px); box-shadow: 0   0   0 var(--dark); }

      footer p {
        font-size: 0.7rem;
        font-weight: 500;
        text-align: center;
        line-height: 2;
        color: var(--dark);
      }
      footer a {
        font-weight: 700;
        color: var(--dark);
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      footer a:hover { color: var(--mid); }

      .toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--white);
        color: var(--dark);
        font-family: "Poppins", sans-serif;
        font-size: 0.82rem;
        font-weight: 600;
        padding: 10px 20px;
        border: 2.5px solid var(--dark);
        border-radius: 10px;
        box-shadow: 4px 4px 0 var(--dark);
        opacity: 0;
        pointer-events: none;
        z-index: 10000;
        transition: opacity 0.25s ease, transform 0.25s ease;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>

    <div class="neo-card">
      <p class="lettermark" style="font-size: 3.8rem; line-height: 1; text-shadow: 5px 5px 0 var(--mint);">
        thanks!
      </p>
      <p style="font-weight: 700; font-size: 1rem; margin-top: 14px;">
        you're on the list 🎉
      </p>
      <p style="font-size: 0.85rem; font-weight: 500; color: var(--mid); margin-top: 6px;">
        we'll be in touch soon
      </p>
      <a href="https://weirdfriends.app/" class="neo-btn">← back home</a>
    </div>

    <footer>
      <p>
        🏗️ with ❤ in berlin by <a href="https://c0n0.com" target="_blank">conor</a>
        &middot; <a href="https://c0n0.com/tags/weirdfriends/" target="_blank">blog</a>
        &middot; <a href="/privacy.html">privacy</a>
        &middot; <a href="/account-deletion-request.html">account deletion</a>
        &middot; <a href="#" id="contact-btn" onclick="copyEmail(event)">contact</a>
      </p>
    </footer>

    <div class="toast" id="toast"></div>

    <script>
      /* Auto-confetti on arrival */
      function launchConfetti() {
        const palette = ['#dbf5f0','#fce0ff','#fef1e7','#1a1a1a','#ffffff','#ffd166'];
        const wrap = document.createElement('div');
        wrap.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden';
        document.body.appendChild(wrap);

        for (let i = 0; i < 90; i++) {
          const el    = document.createElement('div');
          const size  = 6 + Math.random() * 9;
          const color = palette[Math.floor(Math.random() * palette.length)];
          const round = Math.random() > 0.55;
          let x = 20 + Math.random() * 60, y = -5;
          let vx = (Math.random() - 0.5) * 6, vy = 2 + Math.random() * 4;
          let rot = Math.random() * 360;
          const rotSpd = (Math.random() - 0.5) * 10;
          el.style.cssText = `position:absolute;width:${size}px;height:${round ? size : size * 0.5}px;background:${color};border:1.5px solid #1a1a1a;border-radius:${round ? '50%' : '2px'};left:${x}%;top:${y}%;transform-origin:center;`;
          wrap.appendChild(el);

          let f = 0;
          const delay = Math.random() * 600;
          const tick = () => {
            vy += 0.25; vx *= 0.99;
            x += vx * 0.15; y += vy * 0.15; rot += rotSpd;
            el.style.left = x + '%'; el.style.top = y + '%';
            el.style.transform = `rotate(${rot}deg)`;
            el.style.opacity = f < 60 ? 1 : Math.max(0, 1 - (f - 60) / 60);
            if (f++ < 120) requestAnimationFrame(tick); else el.remove();
          };
          setTimeout(() => requestAnimationFrame(tick), delay);
        }
        setTimeout(() => wrap.remove(), 4000);
      }
      window.addEventListener('load', () => setTimeout(launchConfetti, 200));

      function copyEmail(e) {
        e.preventDefault();
        var addr = ['hello', 'weirdfriends', 'app'].join('@').replace('@app', '.app');
        navigator.clipboard.writeText(addr).then(function () {
          var t = document.getElementById('toast');
          t.textContent = '"' + addr + '" copied!';
          t.classList.add('show');
          setTimeout(function () { t.classList.remove('show'); }, 2200);
        });
      }
    </script>
  </body>
</html>
