<html lang="en">
  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weirdfriends — thanks!</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --cream:    #F5EBDC;
        --mint:     #C5EDE8;
        --lavender: #EDE0F0;
        --white:    #FFFFFF;
        --dark:     #1A1A1A;
        --mid:      #6B6565;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: var(--cream);
        color: var(--dark);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        gap: 28px;
      }

      .lettermark { font-family: "Cherry Bomb One", cursive; }

      .neo-card {
        background: var(--white);
        border: 2.5px solid var(--dark);
        box-shadow: 5px 5px 0 var(--dark);
        border-radius: 16px;
        padding: 40px 32px;
        text-align: center;
        max-width: 360px;
        width: 100%;
      }

      .neo-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: "Poppins", sans-serif;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        border: 2.5px solid var(--dark);
        box-shadow: 4px 4px 0 var(--dark);
        border-radius: 10px;
        padding: 13px 28px;
        font-size: 0.95rem;
        background: var(--dark);
        color: var(--cream);
        margin-top: 22px;
        transition: transform 0.08s ease, box-shadow 0.08s ease;
      }
      .neo-btn:hover  { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--dark); }
      .neo-btn:active { transform: translate(4px, 4px); box-shadow: 0   0   0 var(--dark); }

      footer p {
        font-size: 0.7rem;
        font-weight: 500;
        text-align: center;
        line-height: 2;
        color: var(--dark);
      }
      footer a {
        font-weight: 700;
        color: var(--dark);
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      footer a:hover { color: var(--mid); }
    </style>
  </head>
  <body>

    <div class="neo-card">
      <p class="lettermark" style="font-size: 3.8rem; line-height: 1; text-shadow: 5px 5px 0 var(--mint);">
        thanks!
      </p>
      <p style="font-weight: 700; font-size: 1rem; margin-top: 14px;">
        you're on the list 🎉
      </p>
      <p style="font-size: 0.85rem; font-weight: 500; color: var(--mid); margin-top: 6px;">
        we'll be in touch soon
      </p>
      <a href="https://weirdfriends.app/" class="neo-btn">← back home</a>
    </div>

    <footer>
      <p>
        🏗️ with ❤ in berlin by <a href="https://c0n0.com" target="_blank">conor</a>
        &middot; <a href="/privacy.html">privacy</a>
        &middot; <a href="/account-deletion-request.html">account deletion</a>
      </p>
    </footer>

  </body>
</html>
