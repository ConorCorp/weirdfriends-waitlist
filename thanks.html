    <style>
      * {

      body {
        font-family: "Poppins", sans-serif;
        background-color: #ffed47;

      .lettermark {

      }

      .neo-card {
        background: #fff;

        border-radius: 16px;
        padding: 40px 32px;

      .neo-btn {

        font-family: "Poppins", sans-serif;
        font-weight: 700;

        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: transform 0.08s ease, box-shadow 0.08s ease;
        padding: 12px 28px;
        font-size: 0.95rem;
        background: #0d0d0d;
        color: #ffed47;
        margin-top: 20px;
      }

      .neo-btn:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0px #0d0d0d;
      }

      footer {
        margin-top: 32px;
      }

      footer p {
        font-size: 0.72rem;
        color: #0d0d0d;
        font-weight: 500;
        text-align: center;
        line-height: 1.8;
      }

      footer a {
        font-weight: 700;
        color: #0d0d0d;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      footer a:hover {
        color: #ff3b47;
